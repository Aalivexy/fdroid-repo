main:
  web_trigger_update: &web_trigger_update
    - name: Sync fdroid branch from GitHub
      runner:
        cpus: 2
      stages:
        - name: Sync fdroid branch
          script: |
            github_index_url="https://github.com/Aalivexy/fdroid-repo/raw/refs/heads/fdroid/repo/index-v2.json"
            cnb_index_url="https://cnb.cool/aalivexy/fdroid-repo/-/git/raw/fdroid/repo/index-v2.json"
            github_index_file="$(mktemp)"
            cnb_index_file="$(mktemp)"
            workdir="$(mktemp -d)"
            trap 'rm -f "$github_index_file" "$cnb_index_file"; rm -rf "$workdir"' EXIT

            curl -fsSL "$github_index_url" -o "$github_index_file"
            if curl -fsSL "$cnb_index_url" -o "$cnb_index_file"; then
              if cmp -s "$github_index_file" "$cnb_index_file"; then
                echo "GitHub and CNB fdroid indexes are identical, skipping sync"
                exit 0
              fi
            else
              echo "CNB fdroid index not found or unreadable, continuing with sync"
            fi

            git init --initial-branch=fdroid "$workdir"
            cd "$workdir"

            git remote add github https://github.com/Aalivexy/fdroid-repo.git
            git fetch github fdroid
            git checkout -B fdroid FETCH_HEAD

            git config user.name "Cloud Native Build"
            git config user.email "cnb@cnb.cool"
            git remote add origin https://cnb:${CNB_TOKEN}@cnb.cool/aalivexy/fdroid-repo.git
            git push --force origin fdroid
