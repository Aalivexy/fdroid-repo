config:
  repo_name: Aalivexy
  repo_url: https://aalivexy.cc/fdroid/repo
  repo_description: >-
    Aalivexy's F-Droid Repo

  repo_keyalias: $repo_keyalias
  keystore: $keystore
  keystorepass: $keystorepass
  keypass: $keypass
  keydname: $keydname

.fdroid: &fdroid
  metadata_url: https://gitlab.com/fdroid/fdroiddata/-/raw/master/metadata/$PKG_NAME.yml
  info_url: https://mirrors.tuna.tsinghua.edu.cn/fdroid/repo/index-v2.json
  version_jq: .packages."$PKG_NAME".versions | to_entries | sort_by(.value.manifest.versionCode) | reverse | .[0].value.manifest.versionName
  download_jq: .packages."$PKG_NAME".versions | to_entries | sort_by(.value.manifest.versionCode) | reverse | .[0].value.file.name as $filename | "https://mirrors.tuna.tsinghua.edu.cn/fdroid/repo" + $filename

packages:
  - pkg_name: com.limelight.noir
    icon_url: https://github.com/ClassicOldSong/moonlight-android/raw/moonlight-noir/fastlane/metadata/android/en-US/images/icon.png
    metadata:
      Categories:
        - Games
      AuthorName: ClassicOldSong
      License: GPL-3.0
      Name: Artemis
      SourceCode: https://github.com/ClassicOldSong/moonlight-android
      IssueTracker: https://github.com/ClassicOldSong/moonlight-android/issues
      Changelog: https://github.com/ClassicOldSong/moonlight-android/releases
      Summary: An open source client for Apollo/Sunshine.
      Description: |
        Artemis Android will allow you to stream your collection of games from your Windows PC to your Android device, whether in your own home or over the internet.

        Artemis is currently the best fork of Moonlight with loads of optimizations for office usage.

        A more seamless experience with virtual display will be Artemis paired with <a href="https://github.com/ClassicOldSong/Apollo">Apollo</a>.
    info_url: https://api.github.com/repos/ClassicOldSong/moonlight-android/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains("release.apk")) | .browser_download_url

  - pkg_name: com.x8bit.bitwarden
    icon_url: https://github.com/bitwarden/f-droid/raw/main/fdroid/metadata/com.x8bit.bitwarden/icon.png
    metadata_url: https://github.com/bitwarden/f-droid/raw/main/fdroid/metadata/com.x8bit.bitwarden.yml
    info_url: https://github.com/bitwarden/f-droid/raw/main/fdroid/repo/index-v2.json
    version_jq: .packages."$PKG_NAME".versions | to_entries | sort_by(.value.manifest.versionCode) | reverse | .[0].value.manifest.versionName
    download_jq: .packages."$PKG_NAME".versions | to_entries | sort_by(.value.manifest.versionCode) | reverse | .[0].value.file.name as $filename | "https://github.com/bitwarden/f-droid/raw/main/fdroid/repo" + $filename

  - pkg_name: com.looker.droidify
    icon_url: https://github.com/Droid-ify/client/raw/main/metadata/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: com.follow.clash
    icon_url: https://github.com/chen08209/FlClash-fdroid-repo/raw/main/fdroid/metadata/com.follow.clash/en-US/images/icon.png
    metadata_url: https://github.com/chen08209/FlClash-fdroid-repo/raw/main/fdroid/metadata/com.follow.clash.yml
    metadata:
      Summary: A multi-platform proxy client based on ClashMeta,simple and easy to use, open-source and ad-free.
      Description: |
        Features:
        ✈️ Multi-platform: Android, Windows, macOS and Linux
        💻 Adaptive multiple screen sizes, Multiple color themes available
        💡 Based on Material You Design, Surfboard-like UI
        ☁️ Supports data sync via WebDAV
        ✨ Support subscription link, Dark mode
    info_url: https://api.github.com/repos/chen08209/FlClash/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains("arm64-v8a.apk")) | .browser_download_url

  - pkg_name: com.absinthe.libchecker
    icon_url: https://github.com/LibChecker/LibChecker/raw/master/fastlane/metadata/android/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: org.localsend.localsend_app
    icon_url: https://github.com/localsend/localsend/raw/main/fastlane/metadata/android/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: de.syss.MifareClassicTool
    icon_url: https://github.com/ikarus23/MifareClassicTool/raw/master/metadata/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: me.ash.reader
    icon_url: https://github.com/Ashinch/ReadYou/raw/main/fastlane/metadata/android/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: com.seafile.seadroid2
    icon_url: https://github.com/haiwen/seadroid/raw/master/app/src/main/res/drawable-xxxhdpi/ic_launcher.png
    <<: *fdroid

  - pkg_name: moe.shizuku.privileged.api
    icon_url: https://github.com/RikkaApps/Shizuku/raw/master/manager/src/main/res/mipmap-xxxhdpi/ic_launcher.png
    metadata:
      Categories:
        - System
      AuthorName: RikkaApps
      License: Apache-2.0
      Name: Shizuku
      WebSite: https://shizuku.rikka.app
      SourceCode: https://github.com/RikkaApps/Shizuku
      IssueTracker: https://github.com/RikkaApps/Shizuku/issues
      Changelog: https://github.com/RikkaApps/Shizuku/releases
      Summary: Using system APIs directly with adb/root privileges from normal apps through a Java process started with app_process.
      Description: |
        When developing apps that requires root, the most common method is to run some commands in the su shell. For example, there is app uses pm enable/disable command to enable/disable components. This method has very big disadvantages:

        * Extremely slow (Multiple process creation)
        * Needs to process texts (Super unreliable)
        * The possibility is limited to available commands
        * Even if adb has sufficient permissions, the app requires root privileges to run

        Shizuku uses a completely different way. The most important feature Shizuku provides is something like be a middle man to receive requests from the app, sent to the system server, and send back the results. To the app, it is almost identical to the use system APIs directly. But it's much faster as it hooks into the system directly.

        Several apps already use Shizuku. If you want to integrate it with yours, take a look at the Developer guide. For users, there's also a User guide.
      AntiFeatures:
        - UpstreamNonFree
    info_url: https://api.github.com/repos/RikkaApps/Shizuku/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains("release.apk")) | .browser_download_url

  - pkg_name: com.tailscale.ipn
    icon_url: https://github.com/tailscale/tailscale-android/raw/main/metadata/en-US/images/icon.png
    <<: *fdroid

  - pkg_name: com.tommasoberlose.anotherwidget.azuo
    icon_url: https://github.com/azuo/another-widget/raw/patch-develop/app/src/main/ic_launcher-playstore.png
    metadata:
      Categories:
        - Theming
      AuthorName: Azuo Lee
      License: MIT
      Name: Another Widget
      SourceCode: https://github.com/azuo/another-widget
      IssueTracker: https://github.com/azuo/another-widget/issues
      Changelog: https://github.com/azuo/another-widget/releases
      Summary: Watch events, weather and much more at a glance.
      Description: |
        Another Widget intelligently summarizes the information you need most. Watch the next events, the weather, and the information you want in an intuitive and elegant way. (Nope, reminders cannot be displayed because it's not allowed.)

        While respecting the design of the application, there is a great opportunity to customize the information displayed and widget components. Also, as much as possible, there are always updates and new features in the short run.

        Help me developing with feedback and support me on how you can.
    info_url: https://api.github.com/repos/azuo/another-widget/releases/latest
    version_jq: .name | sub("Patched "; "")
    download_jq: .assets[] | select(.name | contains(".apk")) | .browser_download_url

  - pkg_name: li.songe.gkd
    icon_url: https://avatars.githubusercontent.com/u/138121201
    metadata:
      Categories:
        - System
      AuthorName: GKD
      License: GPL-3.0
      Name: GKD
      SourceCode: https://github.com/gkd-kit/gkd
      IssueTracker: https://github.com/gkd-kit/gkd/issues
      Changelog: https://github.com/gkd-kit/gkd/releases
      Summary: 基于无障碍，高级选择器，订阅规则的自定义屏幕点击 Android 应用
      Description: |
        基于 无障碍 + 高级选择器 + 订阅规则 的自定义屏幕点击 APP
        基于 高级选择器 + 订阅规则 + 快照审查 实现根据屏幕上下文信息自定义点击目标控件

        本应用 默认不携带任何规则，需自行添加本地规则，或者通过订阅链接的方式获取规则
        也可通过 subscription-template 快速构建自己的远程订阅
        第三方订阅列表可在 https://github.com/topics/gkd-subscription 查看
    info_url: https://api.github.com/repos/gkd-kit/gkd/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains(".apk")) | .browser_download_url
  
  - pkg_name: com.perol.pixez
    icon_url: https://github.com/Notsfsssf/pixez-flutter/raw/master/assets/images/icon.png
    metadata:
      Categories:
        - Graphics
        - Internet
        - Multimedia
      AuthorName: Perol_Notsfsssf
      License: GPL-3.0
      Name: PixEz Flutter
      SourceCode: https://github.com/Notsfsssf/pixez-flutter
      IssueTracker: https://github.com/Notsfsssf/pixez-flutter/issues
      Changelog: https://github.com/Notsfsssf/pixez-flutter/releases
      Summary: 一个支持免代理直连及查看动图的第三方Pixiv flutter客户端
      Description: |
        🎵 Mili - In Hell We Live, Lament 🎵
      AntiFeatures:
        - NonFreeNet
    info_url: https://api.github.com/repos/Notsfsssf/pixez-flutter/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains("arm64-v8a-release.apk")) | .browser_download_url

  - pkg_name: app.mihon
    icon_url: https://github.com/mihonapp/mihon/raw/main/.github/assets/logo.png
    metadata:
      Categories:
        - Graphics
        - Multimedia
      AuthorName: Mihon Open Source Project
      License: Apache-2.0
      Name: Mihon
      SourceCode: https://github.com/mihonapp/mihon
      IssueTracker: https://github.com/mihonapp/mihon/issues
      Changelog: https://github.com/mihonapp/mihon/releases
      Summary: Free and open source manga reader for Android
      Description: |
        Full-featured reader
        Discover and read manga, webtoons, comics, and more - easier than ever on your Android device.

        Features:
        * Local reading of content.
        * A configurable reader with multiple viewers, reading directions and other settings.
        * Tracker support: MyAnimeList, AniList, Kitsu, MangaUpdates, Shikimori, and Bangumi support.
        * Categories to organize your library.
        * Light and dark themes.
        * Schedule updating your library for new chapters.
        * Create backups locally to read offline or to your desired cloud service.
        * Plus much more...
    info_url: https://api.github.com/repos/mihonapp/mihon/releases/latest
    version_jq: .tag_name
    download_jq: .assets[] | select(.name | contains("arm64-v8a") and contains(".apk")) | .browser_download_url